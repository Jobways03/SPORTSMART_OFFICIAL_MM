<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sportsmart — Offline</title>
    <style>
      body {
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          'Inter',
          'Segoe UI',
          sans-serif;
        background: #fafafa;
        color: #0f1115;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 1.5rem;
      }
      .card {
        max-width: 28rem;
        text-align: center;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.5rem;
      }
      p {
        color: #6b7280;
        margin: 0.25rem 0;
        line-height: 1.5;
      }
      button {
        margin-top: 1.5rem;
        background: #3fa1ae;
        color: white;
        border: 0;
        padding: 0.65rem 1.25rem;
        border-radius: 0.5rem;
        font-size: 0.95rem;
        cursor: pointer;
      }
      button:hover {
        background: #2a8595;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You&rsquo;re offline</h1>
      <p>We can&rsquo;t reach Sportsmart right now.</p>
      <p>Your cart and orders are safe — they&rsquo;ll be here when you reconnect.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
