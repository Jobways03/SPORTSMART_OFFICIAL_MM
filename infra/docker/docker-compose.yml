services:
  postgres:
    image: postgres:16.6-alpine
    container_name: sportsmart-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sportsmart_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sportsmart_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: sportsmart-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    # Phase 14 (2026-05-16) — enable AOF (append-only file) persistence.
    # Default Redis runs RDB-only snapshots every few minutes; on a
    # crash between snapshots we'd lose outbox publisher locks, in-
    # flight idempotency keys, and the rate-limit counters that
    # protect refund APIs. AOF writes every command to disk and fsyncs
    # every second (`appendfsync everysec`) so worst-case data loss
    # is ~1 second of writes — well within our DPDP / payment audit
    # tolerance. Prod runs ElastiCache Redis with AOF enabled at the
    # AWS parameter-group level; this dev/staging config mirrors it.
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
