# SPORTSMART web storefront — HorizontalPodAutoscaler.
#
# Elastic scaling for the customer storefront Deployment (web.deployment.yaml).
# Keep the Deployment's `replicas` equal to minReplicas to avoid a flap on
# apply. autoscaling/v2 requires metrics-server in the cluster.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sportsmart-web-storefront
  labels:
    app.kubernetes.io/name: sportsmart-web-storefront
    app.kubernetes.io/component: frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sportsmart-web-storefront
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min
