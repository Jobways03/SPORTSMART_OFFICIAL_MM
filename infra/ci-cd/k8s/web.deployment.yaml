# SPORTSMART web-* — sample Kubernetes manifest.
#
# Phase 9 (2026-05-16) — one Deployment per Next.js app. Copy this
# file 8 times (one per web-*) and tweak the `app` label + image, OR
# convert into a Helm chart with `app` as a value (preferred long-term).
#
# Each app exposes 3000 internally; nginx (see infra/nginx/sportsmart.conf)
# or an Ingress fans hostnames to the right Service.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sportsmart-web-storefront
  labels:
    app.kubernetes.io/name: sportsmart-web-storefront
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sportsmart-web-storefront
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sportsmart-web-storefront
        app.kubernetes.io/component: frontend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: web
          image: ghcr.io/sportsmart/web-storefront:staging-latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: sportsmart-web-config
                  key: NEXT_PUBLIC_API_URL
            - name: NEXT_PUBLIC_STOREFRONT_URL
              valueFrom:
                configMapKeyRef:
                  name: sportsmart-web-config
                  key: NEXT_PUBLIC_STOREFRONT_URL
          livenessProbe:
            # `next start` doesn't expose a dedicated /healthz; hitting
            # the root path with a HEAD is the lightweight stand-in.
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: sportsmart-web-storefront
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sportsmart-web-storefront
  ports:
    - name: http
      port: 3000
      targetPort: http
