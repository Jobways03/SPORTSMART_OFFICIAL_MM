# SPORTSMART reverse-proxy configuration.
#
# Phase 9 (2026-05-16) — sample nginx config for ops to adapt to the
# target environment. Path-based routing fans /api/* to the NestJS
# upstream and everything else to the customer storefront; the seven
# other web-* apps live behind their own host names.
#
# Replace `sportsmart.example.com` with the real domain before deploy.
# The TLS termination block is intentionally minimal — ops typically
# replaces it with the cert-manager / certbot output for the chosen
# provider.

# ── Edge rate limiting ─────────────────────────────────────────────
# Defence-in-depth in FRONT of Node: nginx sheds floods (scrapers,
# credential-stuffing, accidental client retry storms) before they ever
# reach a worker, complementing the app-level Redis throttler (which does
# the precise per-endpoint/per-actor limits). Keyed on the real client IP
# ($binary_remote_addr is populated from X-Forwarded-For via the
# real_ip module if configured upstream of this proxy; otherwise it is the
# direct peer). These zones live in the http{} context (this file is
# included there).
#
#   api_general — broad /api/* shield, generous so normal SPA traffic
#                 (which can burst many parallel calls per page) is never
#                 throttled; only sustained floods hit the ceiling.
#   api_auth    — tight ring around credential endpoints (login / register
#                 / OTP / refresh / password reset) to blunt brute force.
limit_req_zone  $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone  $binary_remote_addr zone=api_auth:10m    rate=5r/s;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
# 429 (not the nginx default 503) so clients + the app see a proper
# "Too Many Requests" and can back off.
limit_req_status  429;
limit_conn_status 429;

# ── Upstream pools ─────────────────────────────────────────────────
# Container DNS resolution is the simplest pattern that works across
# Docker Compose, Docker Swarm, and Kubernetes — every orchestrator
# rounds the upstream name to a healthy backend.

upstream sportsmart_api {
  server sportsmart-api:4000 max_fails=3 fail_timeout=30s;
  keepalive 32;
}

upstream sportsmart_storefront {
  server sportsmart-web-storefront:3000 max_fails=3 fail_timeout=30s;
  keepalive 32;
}

upstream sportsmart_admin_storefront {
  server sportsmart-web-admin-storefront:3000 max_fails=3 fail_timeout=30s;
  keepalive 32;
}

upstream sportsmart_seller {
  server sportsmart-web-seller:3000 max_fails=3 fail_timeout=30s;
  keepalive 32;
}

# ── Customer storefront + API on a single host ─────────────────────
server {
  listen 443 ssl http2;
  server_name sportsmart.example.com;

  ssl_certificate     /etc/nginx/tls/sportsmart.crt;
  ssl_certificate_key /etc/nginx/tls/sportsmart.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  # Reverse proxy headers — the API reads X-Forwarded-* for client
  # IP detection and rate limiting. Without these every request would
  # appear to originate from the nginx pod.
  proxy_http_version 1.1;
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_set_header   Connection        "";

  # Tight limiter on credential endpoints (brute-force shield). A regex
  # location is evaluated before the /api/ prefix, so these paths get the
  # stricter api_auth zone; the webhooks prefix below is longer/more
  # specific for its own paths and is left unlimited (server-to-server).
  location ~ ^/api/v1/(auth|seller/auth|admin/auth|admin/mfa)/ {
    limit_req  zone=api_auth burst=10 nodelay;
    limit_conn conn_per_ip 20;
    proxy_pass         http://sportsmart_api;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
  }

  # /api/* → NestJS. Keep the timeouts tight; long-poll endpoints
  # (if any) need their own location block with a longer timeout.
  location /api/ {
    limit_req  zone=api_general burst=60 nodelay;
    limit_conn conn_per_ip 50;
    proxy_pass         http://sportsmart_api;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
  }

  # Everything else → customer storefront. Next.js handles its own
  # static assets via the /_next/* paths it owns.
  location / {
    proxy_pass         http://sportsmart_storefront;
    proxy_read_timeout 30s;
  }

  # Webhook receivers need rawBody parsing on the API side. Don't
  # gzip the upstream request body or HMAC verification will mismatch.
  location /api/v1/webhooks/ {
    proxy_pass         http://sportsmart_api;
    proxy_request_buffering off;
    proxy_read_timeout 60s;
  }
}

# ── Admin storefront on its own hostname ───────────────────────────
server {
  listen 443 ssl http2;
  server_name admin.sportsmart.example.com;

  ssl_certificate     /etc/nginx/tls/admin.crt;
  ssl_certificate_key /etc/nginx/tls/admin.key;

  proxy_http_version 1.1;
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;

  location ~ ^/api/v1/(auth|seller/auth|admin/auth|admin/mfa)/ {
    limit_req  zone=api_auth burst=10 nodelay;
    limit_conn conn_per_ip 20;
    proxy_pass         http://sportsmart_api;
    proxy_read_timeout 30s;
  }

  location /api/ {
    limit_req  zone=api_general burst=60 nodelay;
    limit_conn conn_per_ip 50;
    proxy_pass         http://sportsmart_api;
    proxy_read_timeout 30s;
  }

  location / {
    proxy_pass         http://sportsmart_admin_storefront;
    proxy_read_timeout 30s;
  }
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────
server {
  listen 80;
  server_name sportsmart.example.com admin.sportsmart.example.com;
  return 301 https://$host$request_uri;
}
