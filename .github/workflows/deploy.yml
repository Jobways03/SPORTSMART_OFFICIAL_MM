name: Deploy

# Phase 9 (2026-05-16) — manual-trigger deployment workflow.
#
# Two parallel deploy paths:
#   1. The API container → ECR / GHCR → the chosen target cluster.
#   2. Each web-* app → its own image → same target.
#
# Triggered manually via `workflow_dispatch` so a routine push to
# main never accidentally ships. The `environment:` block surfaces
# GitHub's environment-protection rules (required reviewers, secrets
# scoped per stage) before the deploy steps execute — that's the
# real safety net, not the workflow YAML itself.
#
# The actual `deploy` steps below are intentionally illustrative. The
# concrete `kubectl set image` / `aws ecs update-service` / Helm
# command lives in `infra/scripts/deploy.sh`, which the workflow
# invokes. That separation lets ops swap targets without rewriting CI
# YAML.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target environment"
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      services:
        description: "Comma-separated services to deploy (api, web-storefront, …) or 'all'"
        required: true
        type: string
        default: "all"

concurrency:
  # Only one deploy per (environment, branch) in flight. A second
  # workflow_dispatch while one is running is queued, not cancelled —
  # cancelling a half-applied rollout would leave a partial set of
  # pods on the new image.
  group: deploy-${{ inputs.target }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build + push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # for OIDC-federated cloud auth
    env:
      NODE_VERSION: "22"
      PNPM_VERSION: "10.0.0"
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Phase 9 (PR 9.5) — every CI workflow runs a secret scanner.
      # A manual deploy of a poisoned ref must still trip the alarm
      # before any image push happens.
      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        # Short SHA is human-readable; combined with the env name in
        # the registry, an operator can read "api:staging-abc1234" and
        # know exactly which commit shipped where.
        run: echo "tag=${{ inputs.target }}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # API image (single build).
      - name: Build + push API image
        if: contains(inputs.services, 'api') || inputs.services == 'all'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}/api:${{ inputs.target }}-latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      # Frontend matrix — each web-* app built in parallel.
      # The list mirrors the frontend-ci matrix; keep them in lockstep.
      - name: Build + push web-storefront
        if: contains(inputs.services, 'web-storefront') || inputs.services == 'all'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: true
          build-args: APP=web-storefront
          tags: |
            ghcr.io/${{ github.repository }}/web-storefront:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}/web-storefront:${{ inputs.target }}-latest
          cache-from: type=gha,scope=web-storefront
          cache-to: type=gha,scope=web-storefront,mode=max

      - name: Build + push web-admin-storefront
        if: contains(inputs.services, 'web-admin-storefront') || inputs.services == 'all'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: true
          build-args: APP=web-admin-storefront
          tags: |
            ghcr.io/${{ github.repository }}/web-admin-storefront:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}/web-admin-storefront:${{ inputs.target }}-latest
          cache-from: type=gha,scope=web-admin-storefront
          cache-to: type=gha,scope=web-admin-storefront,mode=max

      - name: Build + push web-d2c-seller-admin
        if: contains(inputs.services, 'web-d2c-seller-admin') || inputs.services == 'all'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: true
          build-args: APP=web-d2c-seller-admin
          tags: |
            ghcr.io/${{ github.repository }}/web-d2c-seller-admin:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}/web-d2c-seller-admin:${{ inputs.target }}-latest
          cache-from: type=gha,scope=web-d2c-seller-admin
          cache-to: type=gha,scope=web-d2c-seller-admin,mode=max

      - name: Build + push web-d2c-seller
        if: contains(inputs.services, 'web-d2c-seller') || inputs.services == 'all'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: true
          build-args: APP=web-d2c-seller
          tags: |
            ghcr.io/${{ github.repository }}/web-d2c-seller:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}/web-d2c-seller:${{ inputs.target }}-latest
          cache-from: type=gha,scope=web-d2c-seller
          cache-to: type=gha,scope=web-d2c-seller,mode=max

      - name: Build + push web-retail-seller-admin
        if: contains(inputs.services, 'web-retail-seller-admin') || inputs.services == 'all'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: true
          build-args: APP=web-retail-seller-admin
          tags: |
            ghcr.io/${{ github.repository }}/web-retail-seller-admin:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}/web-retail-seller-admin:${{ inputs.target }}-latest
          cache-from: type=gha,scope=web-retail-seller-admin
          cache-to: type=gha,scope=web-retail-seller-admin,mode=max

      - name: Build + push web-retail-seller
        if: contains(inputs.services, 'web-retail-seller') || inputs.services == 'all'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: true
          build-args: APP=web-retail-seller
          tags: |
            ghcr.io/${{ github.repository }}/web-retail-seller:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}/web-retail-seller:${{ inputs.target }}-latest
          cache-from: type=gha,scope=web-retail-seller
          cache-to: type=gha,scope=web-retail-seller,mode=max

      - name: Build + push web-franchise
        if: contains(inputs.services, 'web-franchise') || inputs.services == 'all'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: true
          build-args: APP=web-franchise
          tags: |
            ghcr.io/${{ github.repository }}/web-franchise:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}/web-franchise:${{ inputs.target }}-latest
          cache-from: type=gha,scope=web-franchise
          cache-to: type=gha,scope=web-franchise,mode=max

      - name: Build + push web-franchise-admin
        if: contains(inputs.services, 'web-franchise-admin') || inputs.services == 'all'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: true
          build-args: APP=web-franchise-admin
          tags: |
            ghcr.io/${{ github.repository }}/web-franchise-admin:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}/web-franchise-admin:${{ inputs.target }}-latest
          cache-from: type=gha,scope=web-franchise-admin
          cache-to: type=gha,scope=web-franchise-admin,mode=max

      - name: Build + push web-affiliate
        if: contains(inputs.services, 'web-affiliate') || inputs.services == 'all'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: true
          build-args: APP=web-affiliate
          tags: |
            ghcr.io/${{ github.repository }}/web-affiliate:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}/web-affiliate:${{ inputs.target }}-latest
          cache-from: type=gha,scope=web-affiliate
          cache-to: type=gha,scope=web-affiliate,mode=max

      - name: Build + push web-affiliate-admin
        if: contains(inputs.services, 'web-affiliate-admin') || inputs.services == 'all'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: true
          build-args: APP=web-affiliate-admin
          tags: |
            ghcr.io/${{ github.repository }}/web-affiliate-admin:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository }}/web-affiliate-admin:${{ inputs.target }}-latest
          cache-from: type=gha,scope=web-affiliate-admin
          cache-to: type=gha,scope=web-affiliate-admin,mode=max

  rollout:
    name: Rollout (${{ inputs.target }})
    runs-on: ubuntu-latest
    needs: build-and-push
    # The `environment:` block invokes GitHub's environment protection
    # rules. For `production` the workflow waits here for the manual
    # approval configured in the repo's Environments tab — that's the
    # real safety check on prod deploys, not anything in this YAML.
    environment:
      name: ${{ inputs.target }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Apply rollout
        env:
          TARGET: ${{ inputs.target }}
          SERVICES: ${{ inputs.services }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        # Delegate the actual cluster command to a script under
        # infra/scripts/ so ops can swap kubectl/Helm/ECS/AppRunner
        # without touching this YAML.
        run: ./infra/scripts/deploy.sh "$TARGET" "$SERVICES" "$IMAGE_TAG"
