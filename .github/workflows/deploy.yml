name: Deploy

# Phase 2 (2026-06-15) — manual-trigger deploy to AWS ECS Fargate.
#
# Flow: prep (auth + compute tag + read API URL) → build (matrix: build &
# push each image to ECR, baking NEXT_PUBLIC_API_URL into the web images) →
# rollout (run infra/scripts/deploy.sh: migrate-then-roll on ECS).
#
# Auth is GitHub OIDC → the Terraform-created deploy role (no static AWS
# keys). Required GitHub repo variables (Settings → Variables):
#   AWS_DEPLOY_ROLE_ARN  = terraform output deploy_role_arn
#   AWS_REGION           = e.g. ap-south-1
# The `production` environment's protection rules (required reviewers) are the
# real prod safety gate.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target environment"
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      services:
        description: "Comma-separated services (no spaces), e.g. api,web-storefront — or 'all'"
        required: true
        type: string
        default: "all"
      run_seed:
        description: "Run the one-shot reference-data seed (admin/ABAC/SLA/tax) before rolling — first boot / on-demand"
        required: false
        type: boolean
        default: false

concurrency:
  # One deploy per (environment, branch); queue rather than cancel — a
  # half-applied rollout must not be interrupted.
  group: deploy-${{ inputs.target }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prep:
    name: Prep
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
      api_url: ${{ steps.cfg.outputs.api_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Secret scan of the ref before anything is built or pushed.
      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        run: echo "tag=${{ inputs.target }}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Read API URL from SSM (baked into web images)
        id: cfg
        run: |
          api_url="$(aws ssm get-parameter \
            --name "/sportsmart/${{ inputs.target }}/deploy/api_url" \
            --query 'Parameter.Value' --output text)"
          echo "api_url=${api_url}" >> "$GITHUB_OUTPUT"

  build:
    name: Build + push (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: prep
    # Gate the PUSH behind the environment too: for production this means the
    # required reviewer must approve BEFORE any image (incl. the moving
    # :<target>-latest tag the task defs reference) reaches ECR — otherwise an
    # autoscale/restart could pull unreviewed bits before the rollout gate.
    environment:
      name: ${{ inputs.target }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: api, dockerfile: infra/docker/Dockerfile.api, app: "" }
          - { name: web-storefront, dockerfile: infra/docker/Dockerfile.web, app: web-storefront }
          - { name: web-admin-storefront, dockerfile: infra/docker/Dockerfile.web, app: web-admin-storefront }
          - { name: web-d2c-seller, dockerfile: infra/docker/Dockerfile.web, app: web-d2c-seller }
          - { name: web-d2c-seller-admin, dockerfile: infra/docker/Dockerfile.web, app: web-d2c-seller-admin }
          - { name: web-retail-seller, dockerfile: infra/docker/Dockerfile.web, app: web-retail-seller }
          - { name: web-retail-seller-admin, dockerfile: infra/docker/Dockerfile.web, app: web-retail-seller-admin }
          - { name: web-franchise, dockerfile: infra/docker/Dockerfile.web, app: web-franchise }
          - { name: web-franchise-admin, dockerfile: infra/docker/Dockerfile.web, app: web-franchise-admin }
          - { name: web-affiliate, dockerfile: infra/docker/Dockerfile.web, app: web-affiliate }
          - { name: web-affiliate-admin, dockerfile: infra/docker/Dockerfile.web, app: web-affiliate-admin }
    # Exact (comma-delimited) match so "web-d2c-seller" doesn't also select
    # "web-d2c-seller-admin".
    if: ${{ inputs.services == 'all' || contains(format(',{0},', inputs.services), format(',{0},', matrix.name)) }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          # Pin build arch to the Fargate task arch (ecs.tf / migrate.tf:
          # cpu_architecture = X86_64). Without this the image arch follows the
          # runner's native arch — fine on amd64 ubuntu-latest today, but a
          # silent exec-format failure if the default runner ever moves to arm64.
          platforms: linux/amd64
          push: true
          # APP + the build-time NEXT_PUBLIC_API_URL only apply to web images;
          # both lines are empty for the api build (blank lines are ignored).
          build-args: |
            ${{ matrix.app != '' && format('APP={0}', matrix.app) || '' }}
            ${{ matrix.app != '' && format('NEXT_PUBLIC_API_URL={0}', needs.prep.outputs.api_url) || '' }}
          tags: |
            ${{ steps.ecr.outputs.registry }}/sportsmart-${{ inputs.target }}/${{ matrix.name }}:${{ needs.prep.outputs.image_tag }}
            ${{ steps.ecr.outputs.registry }}/sportsmart-${{ inputs.target }}/${{ matrix.name }}:${{ inputs.target }}-latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

  rollout:
    name: Rollout (${{ inputs.target }})
    runs-on: ubuntu-latest
    needs: [prep, build]
    # GitHub environment protection (required reviewers for production) gates
    # this job — the real prod safety check.
    environment:
      name: ${{ inputs.target }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # deploy.sh runs migrations (one-shot Fargate task) then force-new-
      # deployment on each service, reading cluster/subnets/sg/migrate-family
      # from SSM. Circuit-breaker rollback on health-check failure.
      - name: Roll out
        env:
          # Opt-in one-shot reference-data seed (deploy.sh runs it after migrate,
          # before rolling). false on normal deploys; true for first boot.
          RUN_SEED: ${{ inputs.run_seed }}
        run: ./infra/scripts/deploy.sh "${{ inputs.target }}" "${{ inputs.services }}" "${{ needs.prep.outputs.image_tag }}"

      # End-to-end gate: verify each deployed service through the public
      # ALB/DNS/TLS (the layer ECS health checks don't cover). Fails the deploy
      # if any service isn't actually serving.
      - name: Smoke test
        run: ./infra/scripts/smoke.sh "${{ inputs.target }}" "${{ inputs.services }}"
