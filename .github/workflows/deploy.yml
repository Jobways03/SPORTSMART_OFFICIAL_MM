name: Deploy to ECS

# Phase 2 (2026-06-15) — manual-trigger deploy to AWS ECS Fargate.
#
# Flow: prep (auth + compute tag + read API URL) → build (matrix: build &
# push each image to ECR, baking NEXT_PUBLIC_API_URL into the web images) →
# rollout (run infra/scripts/deploy.sh: migrate-then-roll on ECS).
#
# Auth is GitHub OIDC → the Terraform-created deploy role (no static AWS
# keys). Required GitHub repo variables (Settings → Variables):
#   AWS_DEPLOY_ROLE_ARN  = terraform output deploy_role_arn   (alias AWS_ROLE_ARN also accepted)
#   AWS_REGION           = e.g. ap-south-1
# The `production` environment's protection rules (required reviewers) are the
# real prod safety gate.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target environment"
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      services:
        description: "Comma-separated services (no spaces), e.g. api,web-storefront — or 'all'"
        required: true
        type: string
        default: "all"
      run_seed:
        description: "Run the one-shot reference-data seed (admin/ABAC/SLA/tax) before rolling — first boot / on-demand"
        required: false
        type: boolean
        default: false

concurrency:
  # One deploy per (environment, branch); queue rather than cancel — a
  # half-applied rollout must not be interrupted.
  group: deploy-${{ inputs.target }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prep:
    name: Prep
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
      api_url: ${{ steps.cfg.outputs.api_url }}
      razorpay_key: ${{ steps.cfg.outputs.razorpay_key }}
      google_client_id: ${{ steps.cfg.outputs.google_client_id }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Secret scan of the ref before anything is built or pushed.
      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        run: echo "tag=${{ inputs.target }}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Build the matrix here (filtered by the services input) and hand it to the
      # build job. A job-level `if` cannot reference `matrix`, so the old
      # per-job filter made the whole workflow file invalid (startup failure).
      - name: Compute build matrix
        id: matrix
        env:
          SERVICES: ${{ inputs.services }}
        run: |
          cat > /tmp/catalog.json <<'JSON'
          [
          {"name":"api","dockerfile":"infra/docker/Dockerfile.api","app":""},
          {"name":"web-storefront","dockerfile":"infra/docker/Dockerfile.web","app":"web-storefront"},
          {"name":"web-admin-storefront","dockerfile":"infra/docker/Dockerfile.web","app":"web-admin-storefront"},
          {"name":"web-d2c-seller","dockerfile":"infra/docker/Dockerfile.web","app":"web-d2c-seller"},
          {"name":"web-d2c-seller-admin","dockerfile":"infra/docker/Dockerfile.web","app":"web-d2c-seller-admin"},
          {"name":"web-retail-seller","dockerfile":"infra/docker/Dockerfile.web","app":"web-retail-seller"},
          {"name":"web-retail-seller-admin","dockerfile":"infra/docker/Dockerfile.web","app":"web-retail-seller-admin"},
          {"name":"web-franchise","dockerfile":"infra/docker/Dockerfile.web","app":"web-franchise"},
          {"name":"web-franchise-admin","dockerfile":"infra/docker/Dockerfile.web","app":"web-franchise-admin"},
          {"name":"web-affiliate","dockerfile":"infra/docker/Dockerfile.web","app":"web-affiliate"},
          {"name":"web-affiliate-admin","dockerfile":"infra/docker/Dockerfile.web","app":"web-affiliate-admin"},
          {"name":"logistics-facade","dockerfile":"apps/logistics-facade/Dockerfile","app":""}
          ]
          JSON
          if [ "$SERVICES" = "all" ]; then
            include="$(jq -c . /tmp/catalog.json)"
          else
            # Exact (comma-delimited) match so "web-d2c-seller" doesn't also
            # select "web-d2c-seller-admin".
            include="$(jq -c --arg list "$SERVICES" '[.[] | select(.name as $n | ($list | split(",")) | index($n))]' /tmp/catalog.json)"
          fi
          if [ "$(echo "$include" | jq 'length')" -eq 0 ]; then
            echo "::error::No services matched '$SERVICES'"; exit 1
          fi
          echo "matrix={\"include\":$include}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN || vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Read build-time config from SSM (baked into web images)
        id: cfg
        run: |
          api_url="$(aws ssm get-parameter \
            --name "/sportsmart/${{ inputs.target }}/deploy/api_url" \
            --query 'Parameter.Value' --output text)"
          echo "api_url=${api_url}" >> "$GITHUB_OUTPUT"
          # Razorpay PUBLISHABLE key id — OPTIONAL. The storefront checkout shows
          # the "Pay online" option only when this is set at build time. A missing
          # parameter resolves to empty => COD-only, so an environment without
          # online payment still builds cleanly (no failure).
          razorpay_key="$(aws ssm get-parameter \
            --name "/sportsmart/${{ inputs.target }}/deploy/razorpay_key_id" \
            --query 'Parameter.Value' --output text 2>/dev/null || echo '')"
          echo "razorpay_key=${razorpay_key}" >> "$GITHUB_OUTPUT"
          # Google OAuth PUBLIC client id — OPTIONAL (mirrors razorpay_key_id).
          # Terraform writes this param only when google_client_id is set, so a
          # missing param resolves to empty => the storefront hides the "Sign in
          # with Google" button (and the API treats it as not-configured).
          google_client_id="$(aws ssm get-parameter \
            --name "/sportsmart/${{ inputs.target }}/deploy/google_client_id" \
            --query 'Parameter.Value' --output text 2>/dev/null || echo '')"
          echo "google_client_id=${google_client_id}" >> "$GITHUB_OUTPUT"

  build:
    name: Build + push (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: prep
    # Gate the PUSH behind the environment too: for production this means the
    # required reviewer must approve BEFORE any image (incl. the moving
    # :<target>-latest tag the task defs reference) reaches ECR — otherwise an
    # autoscale/restart could pull unreviewed bits before the rollout gate.
    environment:
      name: ${{ inputs.target }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      # Matrix is computed (and filtered by inputs.services) in the prep job —
      # a job-level `if` cannot reference `matrix`.
      matrix: ${{ fromJson(needs.prep.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN || vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          # Pin build arch to the Fargate task arch (ecs.tf / migrate.tf:
          # cpu_architecture = X86_64). Without this the image arch follows the
          # runner's native arch — fine on amd64 ubuntu-latest today, but a
          # silent exec-format failure if the default runner ever moves to arm64.
          platforms: linux/amd64
          push: true
          # APP + the build-time NEXT_PUBLIC_API_URL only apply to web images;
          # both lines are empty for the api build (blank lines are ignored).
          build-args: |
            ${{ matrix.app != '' && format('APP={0}', matrix.app) || '' }}
            ${{ matrix.app != '' && format('NEXT_PUBLIC_API_URL={0}', needs.prep.outputs.api_url) || '' }}
            ${{ matrix.app != '' && format('NEXT_PUBLIC_RAZORPAY_KEY_ID={0}', needs.prep.outputs.razorpay_key) || '' }}
            ${{ matrix.app != '' && format('NEXT_PUBLIC_GOOGLE_CLIENT_ID={0}', needs.prep.outputs.google_client_id) || '' }}
          tags: |
            ${{ steps.ecr.outputs.registry }}/sportsmart-${{ inputs.target }}/${{ matrix.name }}:${{ needs.prep.outputs.image_tag }}
            ${{ steps.ecr.outputs.registry }}/sportsmart-${{ inputs.target }}/${{ matrix.name }}:${{ inputs.target }}-latest
          cache-from: type=gha,scope=${{ matrix.name }}
          # ignore-error=true: the GitHub Actions Cache backend occasionally
          # 503s on export (it's a build-speed optimisation, not part of the
          # image). Without this, a transient cache-upload failure marks the
          # whole build red AFTER the image already pushed to ECR — which blocks
          # the deploy job for no real reason. Make cache export best-effort.
          cache-to: type=gha,scope=${{ matrix.name }},mode=max,ignore-error=true

  rollout:
    name: Rollout (${{ inputs.target }})
    runs-on: ubuntu-latest
    needs: [prep, build]
    # GitHub environment protection (required reviewers for production) gates
    # this job — the real prod safety check.
    environment:
      name: ${{ inputs.target }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN || vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # deploy.sh runs migrations (one-shot Fargate task) then force-new-
      # deployment on each service, reading cluster/subnets/sg/migrate-family
      # from SSM. Circuit-breaker rollback on health-check failure.
      - name: Roll out
        env:
          # Opt-in one-shot reference-data seed (deploy.sh runs it after migrate,
          # before rolling). false on normal deploys; true for first boot.
          RUN_SEED: ${{ inputs.run_seed }}
        run: ./infra/scripts/deploy.sh "${{ inputs.target }}" "${{ inputs.services }}" "${{ needs.prep.outputs.image_tag }}"

      # End-to-end gate: verify each deployed service through the public
      # ALB/DNS/TLS (the layer ECS health checks don't cover). Fails the deploy
      # if any service isn't actually serving.
      - name: Smoke test
        run: ./infra/scripts/smoke.sh "${{ inputs.target }}" "${{ inputs.services }}"
