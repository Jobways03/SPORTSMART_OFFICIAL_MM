name: API CI

# Scope: runs on PRs and pushes that actually touch the API code,
# lockfile, or shared packages it depends on. The six frontend apps
# have (or will have) their own workflow files — no point rebuilding
# all of them when only api/ changes, and vice versa.
on:
  pull_request:
    paths:
      - "apps/api/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/api-ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/api-ci.yml"

# Cancel superseded runs on the same ref. Developers push frequently
# while iterating and queuing ten in-flight runs wastes CI minutes.
concurrency:
  group: api-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    # Matches the Node major pinned in infra/docker/Dockerfile.api.
    # If the Dockerfile moves, bump this to match — the whole point
    # is CI exercising the same runtime the image will run under.
    env:
      NODE_VERSION: "22"
      PNPM_VERSION: "10.0.0"
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks needs full history to scan all commits in the
          # PR range. The default shallow checkout (fetch-depth: 1)
          # makes it scan only the merge commit, missing leaked
          # secrets in intermediate commits of the same PR.
          fetch-depth: 0

      # Run secret scanning EARLY (before any install / build) so a
      # credential leak fails the workflow in seconds rather than
      # burning ~5min of compile time. The action exits non-zero on
      # any detection — gitleaks-action default ruleset covers the
      # major patterns (AWS keys, GCP / Azure tokens, JWT signing
      # keys, private SSH keys, generic high-entropy strings).
      #
      # GITLEAKS_LICENSE is optional and only required for private
      # GitHub Organisation accounts; personal-account private repos
      # use the action for free. If/when this repo moves under an
      # org, the operator must add the license secret OR swap to a
      # CLI-install step that bypasses the org-license check.
      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Phase 9 (2026-05-16) — SCA: compare the PR's dependency
      # manifest against the base ref + the GitHub Advisory Database.
      # Fails on any dep added in this PR with a known HIGH/CRITICAL
      # advisory. PR-only (the action no-ops on push) — for push-to-
      # main coverage we lean on Dependabot's daily scan instead.
      - name: Dependency review (PR diff)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

      # Phase 9 (2026-05-16) — SCA: scan the full installed dep tree
      # against the OSV database. Catches transitive vulns the
      # advisory-database diff in `dependency-review` won't see (it
      # only inspects direct manifest changes). Configured to fail
      # the build on HIGH/CRITICAL; lower-severity reports surface
      # as workflow annotations but don't block.
      - name: SCA scan (osv-scanner)
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --lockfile=pnpm-lock.yaml
            --fail-on-vuln-severity=HIGH

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter "@sportsmart/api..."

      # Prisma generate must run before typecheck / build because the
      # generated client is imported throughout the codebase.
      - name: Prisma generate
        working-directory: apps/api
        run: pnpm exec prisma generate

      - name: Prisma schema validate
        working-directory: apps/api
        run: pnpm exec prisma validate

      - name: Lint
        run: pnpm --filter @sportsmart/api run lint

      # tsc --noEmit is the canonical "does this compile" check. Faster
      # than `build` and catches the same class of errors.
      - name: Typecheck
        working-directory: apps/api
        run: pnpm exec tsc --noEmit

      # Phase 9 (2026-05-16) — pass --coverage so jest writes
      # coverage/lcov.info + coverage/coverage-summary.json. The
      # threshold in jest.config.js fails the job if the floor is
      # breached; ratchet that up over time, never down.
      - name: Unit tests (with coverage)
        run: pnpm --filter @sportsmart/api test -- --coverage

      # Upload the lcov report as an artifact so the PR author can
      # drill into uncovered lines without re-running locally.
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-${{ github.run_id }}
          path: apps/api/coverage/
          retention-days: 14
          if-no-files-found: warn

      # e2e stays as a separate job / workflow once DB-backed tests
      # land. Today's e2e suite uses in-memory fakes so it is cheap to
      # include, but deliberately kept as its own step so a regression
      # there does not mask a unit-test failure in the log.
      - name: E2E tests
        run: pnpm --filter @sportsmart/api test:e2e

      - name: Build
        run: pnpm --filter @sportsmart/api run build
