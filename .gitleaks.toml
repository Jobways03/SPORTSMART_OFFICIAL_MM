# gitleaks config — SportsMart monorepo.
#
# Purpose: the deploy gate (.github/workflows/deploy.yml `prep` job runs
# `gitleaks detect` over the full history on every run) must catch NEW real
# secrets in real source — NOT re-flag test fixtures, lock-file checksums, seed
# data, or documented *.env.example placeholders on every deploy.
#
# ⚠️ The git HISTORY of the *.env.example files once contained REAL credentials
# (Gemini / Cloudinary / Gmail app password). Those are allowlisted below so
# they stop blocking deploys, but allowlisting only quiets the scanner — it does
# NOT revoke them. They remain in git history and MUST be rotated at each
# provider. Tracked separately as a standing security task.

title = "sportsmart"

[extend]
useDefault = true

[allowlist]
description = "Test fixtures, lock files, seed data, docs, and *.env.example placeholders (fake/example/checksum values, not live secrets)."
paths = [
  '''.*\.spec\.ts$''',                # unit/integration test fixtures
  '''.*\.e2e-spec\.ts$''',            # e2e test fixtures
  '''(^|/)test/.*''',                 # test/ dirs (e.g. apps/*/test/setup.ts)
  '''(^|/)tests/.*''',
  '''(^|/)__tests__/.*''',
  '''.*\.env\.example$''',            # documented placeholders (see note above)
  '''(^|/)Podfile\.lock$''',          # CocoaPods checksums look like keys
  '''(^|/)prisma/seed/.*''',          # reference-data seeds (HSN/tax codes, not secrets)
  '''.*\.md$''',                      # docs with example/placeholder values
  # Known false positive: the default "vault-service-token" rule (Vault tokens
  # start with "s.") matches the code expression `s.commission...` here.
  '''apps/api/src/modules/tax/application/services/marketplace-commission-gstr\.service\.ts$''',
]
